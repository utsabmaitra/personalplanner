<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC 26 Masterplannar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
                
        :root {
            --bg: #0b1120; --card: #1e293b; --accent: #38bdf8;
            --success: #10b981; --text: #f1f5f9; --sub: #94a3b8; --border: #334155;
            --error: #ef4444;
            --premium-grad: linear-gradient(135deg, #10b981, #059669);
            --error-grad: linear-gradient(135deg, #ef4444, #b91c1c);
            --neon-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
                
        .header { text-align: center; padding: 15px 0; position: sticky; top: 0; background: rgba(11, 17, 32, 0.95); z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
        
        .countdown-box {
            display: inline-flex; gap: 6px; background: rgba(15, 23, 42, 0.8);
            padding: 10px 15px; border-radius: 12px; border: 1px solid var(--accent);
            box-shadow: var(--neon-shadow); margin: 8px 0;
            transition: 0.3s ease;
        }

        /* --- Global Timer States --- */
        .timer-locked { opacity: 0.3; filter: grayscale(1); }
        
        .timer-running { 
            animation: timerBlink 2s infinite; 
            opacity: 1 !important; 
            filter: none !important; 
        }

        @keyframes timerBlink {
            0%, 100% { border-color: var(--accent); box-shadow: var(--neon-shadow); }
            50% { border-color: #0ea5e9; box-shadow: 0 0 25px rgba(56, 189, 248, 0.7); }
        }

        .time-unit { display: flex; flex-direction: column; align-items: center; min-width: 35px; }
        .time-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
        .time-label { font-size: 7px; color: var(--sub); text-transform: uppercase; margin-top: 3px; font-weight: 700; }
        .sep { font-size: 18px; font-weight: 800; color: var(--border); line-height: 1; }

        .progress-container { width: 92%; max-width: 400px; margin: 8px auto; }
        .progress-bar { height: 5px; background: #334155; border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
        #fill { height: 100%; width: 0%; background: linear-gradient(90deg, #38bdf8, #10b981); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .start-btn { 
            background: linear-gradient(135deg, #38bdf8, #1e3a8a); color: white; border: none; 
            padding: 8px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; 
            font-size: 12px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-running { background: transparent !important; border: 2px solid var(--success) !important; color: var(--success) !important; animation: btnBlink 1.5s infinite; }
        @keyframes btnBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Missed Task: Left border removed */
        tr.missed { background: rgba(239, 68, 68, 0.25) !important; animation: missedBlink 2s infinite; }
        @keyframes missedBlink { 0%, 100% { background: rgba(239, 68, 68, 0.2); } 50% { background: rgba(239, 68, 68, 0.35); } }

        .row-timer {
            display: flex; gap: 2px; background: rgba(56, 189, 248, 0.05);
            padding: 3px 4px; border-radius: 4px; border: 1px solid rgba(56, 189, 248, 0.2);
            margin-top: 4px; justify-content: center; align-items: center;
        }
        .rt-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent); }
        .rt-sep { color: var(--border); font-size: 9px; font-weight: 800; }

        .container { max-width: 950px; margin: 10px auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #0f172a; color: var(--sub); padding: 12px 4px; font-size: 10px; text-transform: uppercase; text-align: center; }
        
        td { 
            padding: 10px 4px; border-bottom: 1px solid var(--border); font-size: 12px; 
            vertical-align: middle; text-align: center; white-space: normal; 
            word-wrap: break-word; overflow-wrap: break-word; 
        }

        .col-date { width: 80px; }
        .col-task { width: auto; }
        .col-bio { width: 90px; }
        .col-done { width: 45px; }

        .t-cell, .col-bio { 
            cursor: grab; 
            padding: 10px 8px; 
            transition: opacity 0.15s ease-in-out, transform 0.2s ease, background 0.2s ease; 
        }
        .t-cell:active, .col-bio:active { 
            cursor: grabbing; 
            opacity: 0.6; 
            transform: scale(0.95); 
        }
        /* Cell background transparent রাখা জরুরি যেন Row এর কালার দেখা যায় */
        td { background: transparent !important; } 

        .drag-over { 
            /* background তুলে দিয়ে শুধু একটা গ্লো আর বর্ডার দিচ্ছি */
            background: rgba(56, 189, 248, 0.1) !important; 
            outline: 2px solid var(--accent) !important;
            outline-offset: -2px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            z-index: 5;
        }

        .month-row { background: #1e3a8a; color: #fff; font-weight: 800; text-align: center; font-size: 12px; }
        tr.done { background: rgba(16, 185, 129, 0.04); color: var(--sub); }
        tr.done td:not(.status-td) { text-decoration: line-through; opacity: 0.4; cursor: not-allowed !important; }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--success); }

        #toast-box { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        /* --- Butter Smooth Toast Exit Animation --- */
.toast { 
    background: var(--premium-grad); color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 12px; 
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); 
    animation: toastPop 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    /* যাওয়ার সময় যেন হুট করে গায়েব না হয়ে স্মুথলি যায় */
    transition: opacity 0.4s ease, transform 0.4s ease; 
}
        .toast.red { background: var(--error-grad); }
        @keyframes toastPop { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- Butter Smooth Modal Animations --- */
#modal-overlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; 
    z-index: 10000; backdrop-filter: blur(6px);
    /* display: none এর বদলে opacity এবং visibility ব্যবহার করা হলো স্মুথ ট্রানজিশনের জন্য */
    opacity: 0; visibility: hidden; pointer-events: none; 
    transition: opacity 0.3s ease, visibility 0.3s ease; 
}
#modal-overlay.show { 
    opacity: 1; visibility: visible; pointer-events: auto; 
}
.modal { 
    background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid var(--border); 
    max-width: 300px; width: 85%; text-align: center; 
    /* পপ-আপ স্প্রিং ইফেক্ট */
    transform: scale(0.8) translateY(20px); 
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
#modal-overlay.show .modal { 
    transform: scale(1) translateY(0); 
}

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 10px; border-radius: 8px; border: none; font-weight: 700; flex: 1; cursor: pointer; }
        
        .particle { position: fixed; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; pointer-events: none; animation: burst 0.6s ease-out forwards; }
        @keyframes burst { to { transform: translate(var(--x), var(--y)); opacity: 0; } }
        
        /* Scroll Mode Styles */
.container.scroll-active {
    overflow-x: auto !important;
}
.container.scroll-active table {
    width: 900px !important; /* স্ক্রল মোডে টেবিলটি ৯০০ পিক্সেল চওড়া হবে */
    table-layout: auto !important;
}
#scroll-btn {
    background: rgba(30, 41, 59, 0.5);
    border: 1px solid var(--border);
    margin-bottom: 10px;
}
#scroll-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--neon-shadow);
}
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">

</head>
<body>

    <div id="modal-overlay">
        <div class="modal">
            <h4 id="modal-title" style="margin:0; color:var(--accent);">Confirm Action</h4>
            <p id="modal-text" style="color:var(--sub); font-size:13px; margin-top:8px;"></p>
            <div class="modal-btns" id="modal-actions"></div>
        </div>
    </div>

    <div id="toast-box"></div>

    <div class="header">
        <h3 style="margin:0; color:var(--accent); font-size: 16px;">🚀 HSC '26 MASTERPLANNAR</h3>
        <div class="countdown-box timer-locked" id="global-timer-box">
            <div class="time-unit"><span class="time-val" id="d-val">00</span><span class="time-label">Days</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="h-val">00</span><span class="time-label">Hours</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="m-val">00</span><span class="time-label">Mins</span></div>
            <span class="sep">:</span>
            <div class="time-unit"><span class="time-val" id="s-val">00</span><span class="time-label">Secs</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar"><div id="fill"></div></div>
            <p id="stat" style="font-size: 9px; color: var(--sub); margin: 0; font-weight: 700;">0% Completed</p>
        </div>
        <button class="start-btn" id="start-btn" onclick="startTimer()">START STUDY SESSION</button>
        <button class="start-btn" id="scroll-btn" onclick="toggleScroll()">🔓 ENABLE SCROLL</button>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th class="col-date">Date</th>
                    <th class="col-task">Task 1</th>
                    <th class="col-task">Task 2</th>
                    <th class="col-bio">E/B/I</th>
                    <th class="col-done">Done</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

<script>
    
      const initialPlan = [
        { m: "April 2026", d: [
      { date: "Apr 05", t1: "", t2: "ICT Ch-05 (One Shot) Phase-1", t3: "" },
      { date: "Apr 06", t1: "", t2: "ICT Ch-05 (One Shot) Phase-2", t3: "" },
      { date: "Apr 07", t1: "ICT Ch-05 (Practice)", t2: "", t3: "Bng 1st K-02" },
      { date: "Apr 08", t1: "", t2: "ICT Ch-03 (One Shot)", t3: "" },
      { date: "Apr 09", t1: "ICT Ch-03 (Practice)", t2: "", t3: "Bng 1st K-03" },
      { date: "Apr 10", t1: "", t2: "ICT Ch-01 (One Shot)", t3: "Bng 1st K-04" },
      { date: "Apr 11", t1: "Phy 2nd Ch-04 (7–8)", t2: "Phy 2nd Ch-04 (9–11)", t3: "" },
      { date: "Apr 12", t1: "Phy 2nd Ch-04 (Practice)", t2: "", t3: "Bng 1st K-09" },
      { date: "Apr 13", t1: "Phy 2nd Ch-02 (13–14)", t2: "Phy 2nd Ch-02 (15–18)", t3: "" },
      { date: "Apr 14", t1: "Phy 2nd Ch-02 (19–20)", t2: "Phy 2nd Ch-02 (Practice)", t3: "" },
      { date: "Apr 15", t1: "Phy 1st Ch-10 (1–2)", t2: "Phy 1st Ch-10 (3–6)", t3: "" },
      { date: "Apr 16", t1: "Phy 1st Ch-10 (7–8)", t2: "Phy 1st Ch-10 (9–12)", t3: "" },
      { date: "Apr 17", t1: "Phy 1st Ch-10 (13)", t2: "Phy 1st Ch-10 (Practice)", t3: "" },
      { date: "Apr 18", t1: "Phy 2nd Ch-01 (1–2)", t2: "Phy 2nd Ch-01 (3–6)", t3: "" },
      { date: "Apr 19", t1: "Phy 2nd Ch-01 (7–8)", t2: "Phy 2nd Ch-01 (9–12)", t3: "" },
      { date: "Apr 20", t1: "Phy 2nd Ch-01 (Practice)", t2: "", t3: "Bng 1st K-06" },
      { date: "Apr 21", t1: "Maths 1st Ch-09 (1–2)", t2: "Maths 1st Ch-09 (3–6)", t3: "" },
      { date: "Apr 22", t1: "Maths 1st Ch-09 (7–8)", t2: "Maths 1st Ch-09 (9–12)", t3: "" },
      { date: "Apr 23", t1: "Maths 1st Ch-09 (13–14)", t2: "Maths 1st Ch-09 (15–18)", t3: "" },
      { date: "Apr 24", t1: "Maths 1st Ch-09 (19–20)", t2: "Maths 1st Ch-09 (21–22)", t3: "" },
      { date: "Apr 25", t1: "Maths 1st Ch-09 (Practice)", t2: "", t3: "Bng 1st K-10" },
      { date: "Apr 26", t1: "Maths 1st Ch-08 (5–6)", t2: "Maths 1st Ch-08 (7)", t3: "Eng 1st U-01" },
      { date: "Apr 27", t1: "Maths 1st Ch-08 (Practice)", t2: "", t3: "Eng 1st U-02" },
      { date: "Apr 28", t1: "Maths 2nd Ch-09 (1–2)", t2: "Maths 2nd Ch-09 (3–6)", t3: "" },
      { date: "Apr 29", t1: "Maths 2nd Ch-09 (7–8)", t2: "Maths 2nd Ch-09 (9–11)", t3: "" },
      { date: "Apr 30", t1: "Maths 2nd Ch-09 (Practice)", t2: "", t3: "Eng 1st U-03" }
        ]},
        { m: "May 2026", d: [
      { date: "May 01", t1: "Maths 2nd Ch-10 (1–2)", t2: "Maths 2nd Ch-10 (3–6)", t3: "" },
      { date: "May 02", t1: "Maths 2nd Ch-10 (7–8)", t2: "Maths 2nd Ch-10 (Practice)", t3: "" },
      { date: "May 03", t1: "Chem 1st Ch-03 (10–11)", t2: "Chem 1st Ch-03 (12–15)", t3: "" },
      { date: "May 04", t1: "Chem 1st Ch-03 (16–17)", t2: "Chem 1st Ch-03 (18–21)", t3: "" },
      { date: "May 05", t1: "Chem 1st Ch-03 (Practice)", t2: "", t3: "Bng 1st K-11" },
      { date: "May 06", t1: "Chem 2nd Ch-01 (1–2)", t2: "Chem 2nd Ch-01 (3–6)", t3: "" },
      { date: "May 07", t1: "Chem 2nd Ch-01 (7–8)", t2: "Chem 2nd Ch-01 (9–12)", t3: "" },
      { date: "May 08", t1: "Chem 2nd Ch-01 (Practice)", t2: "", t3: "Bng 1st G-06" }
        ]}
    ];
    
    // সাউন্ড ইফেক্টস কনফিগারেশন
const sounds = {
    success: new Audio('success.mp3'), // টাস্ক ডান হলে
    click: new Audio('click.mp3'),   // বাটন বা সোয়াপ করলে
    alert: new Audio('alert.mp3'),    // এরর বা ওয়ার্নিং আসলে
    completion: new Audio('completion.mp3')
};

// সাউন্ড প্লে করার হেল্পার ফাংশন
function playSfx(type) {
    if (sounds[type]) {
        sounds[type].currentTime = 0; // আগের প্লে শেষ না হলেও আবার শুরু হবে
        sounds[type].play().catch(() => console.log("Sound blocked by browser"));
    }
}

    const STORAGE_KEY = "hsc26_v27_final";
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        tasks: initialPlan, done: {}, activeId: null, startTime: null 
    };

    let timerRef = null;
    let draggedSource = null;
    let scrollSpeed = 0;
    let scrollAnimationFrame = null;

    function getRealDate(monthYearStr, dayStr) {
        const monthMap = { "Jan": 0, "Feb": 1, "Mar": 2, "Apr": 3, "May": 4, "Jun": 5, "Jul": 6, "Aug": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dec": 11 };
        const monthPart = dayStr.split(" ")[0];
        const day = parseInt(dayStr.split(" ")[1]);
        const year = parseInt(monthYearStr.split(" ")[1]);
        return new Date(year, monthMap[monthPart], day);
    }

    function startAutoScroll() {
        if (scrollSpeed !== 0) {
            window.scrollBy(0, scrollSpeed);
            scrollAnimationFrame = requestAnimationFrame(startAutoScroll);
        }
    }

    window.addEventListener('dragover', (e) => {
        if (!draggedSource) return;
        e.preventDefault(); // স্মুথ ড্রপের জন্য এটা জরুরি

        const edge = 150; // স্ক্রিনের কত কাছে গেলে স্ক্রোল শুরু হবে
        const speedMultiplier = 20; // ম্যাক্সিমাম স্পিড

        // ডায়নামিক স্পিড ক্যালকুলেশন (কাছে গেলে স্পিড বাড়বে)
        if (e.clientY < edge) {
            scrollSpeed = -Math.max(1, speedMultiplier * (1 - e.clientY / edge));
        } else if (window.innerHeight - e.clientY < edge) {
            scrollSpeed = Math.max(1, speedMultiplier * (1 - (window.innerHeight - e.clientY) / edge));
        } else {
            scrollSpeed = 0;
        }

        if (scrollSpeed !== 0 && !scrollAnimationFrame) startAutoScroll();
        else if (scrollSpeed === 0 && scrollAnimationFrame) { cancelAnimationFrame(scrollAnimationFrame); scrollAnimationFrame = null; }
    });
    window.addEventListener('dragend', () => { 
        scrollSpeed = 0; 
        draggedSource = null;
        if (scrollAnimationFrame) {
            cancelAnimationFrame(scrollAnimationFrame);
            scrollAnimationFrame = null;
        }
        
        // ড্র্যাগ শেষ হওয়া মাত্র পুরো টেবিল ঝকঝকে পরিষ্কার
        document.querySelectorAll('.drag-over').forEach(cell => {
            cell.classList.remove('drag-over');
        });
    });

    function init(isFirstLoad = false) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    let globalId = 1;
    const now = new Date();
    now.setHours(0, 0, 0, 0);

    state.tasks.forEach(month => {
        tbody.insertAdjacentHTML('beforeend', `<tr class="month-row"><td colspan="5">${month.m}</td></tr>`);
        month.d.forEach(day => {
            const id = globalId++;
            day.id = id;
            const taskDate = getRealDate(month.m, day.date);
            const isDone = state.done[id];
            
            const isMissed = state.activeId && !isDone && taskDate < now;

            const rowClass = isDone ? 'done' : (isMissed ? 'missed' : '');
            const isChecked = isDone ? 'checked' : '';
            
            const tr = document.createElement('tr');
            tr.className = rowClass; tr.id = `row-${id}`;
            tr.innerHTML = `
                <td class="col-date">
                    ${day.date}
                    <div class="row-timer ${state.activeId ? '' : 'timer-locked'}" id="rt-${id}">
                        <span class="rt-val" id="rt-h-${id}">24</span><span class="rt-sep">:</span>
                        <span class="rt-val" id="rt-m-${id}">00</span><span class="rt-sep">:</span>
                        <span class="rt-val" id="rt-s-${id}">00</span>
                    </div>
                </td>
                <td class="t-cell" draggable="true" data-id="${id}" data-field="t1">${day.t1}</td>
                <td class="t-cell" draggable="true" data-id="${id}" data-field="t2">${day.t2}</td>
                <td class="col-bio" draggable="true" data-id="${id}" data-field="t3">${day.t3}</td>
                <td class="status-td col-done">
                    <input type="checkbox" onclick="handleTick(${id}, this)" ${isChecked}>
                </td>
            `;

            // --- শুধুমাত্র এই একটি ব্লক থাকবে ---
            tr.querySelectorAll('[draggable="true"]').forEach(cell => {
                cell.addEventListener('dragstart', (e) => handleDragStart(e, id, cell.getAttribute('data-field')));
                
                cell.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if(!state.done[id] && draggedSource) {
                        // Cleanup: মাউস যে সেলে আছে সেটা ছাড়া বাকি সব নীল বর্ডার মুছে দাও
                        document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
                        cell.classList.add('drag-over');
                    }
                });

                cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                cell.addEventListener('drop', (e) => handleDrop(e, id, cell));
            });
            // --- ব্লক শেষ ---

            tbody.appendChild(tr);
        });
    });

    if (state.activeId) {
        updateButtonUI(true);
        const globalBox = document.getElementById('global-timer-box');
        globalBox.classList.remove('timer-locked');
        globalBox.classList.add('timer-running');
        
        if (isFirstLoad) {
            checkMissedDays();
        }
    }
    runTimer();
}

    function runTimer() {
        if (timerRef) clearInterval(timerRef);
        timerRef = setInterval(updateStats, 1000);
        updateStats();
    }

    function updateStats() {
        let total = 0; state.tasks.forEach(m => total += m.d.length);
        const done = Object.keys(state.done).filter(k => !isNaN(k)).length;
        const per = Math.round((done / total) * 100) || 0;
        document.getElementById('fill').style.width = per + '%';
        document.getElementById('stat').innerText = `${per}% Overall Progress (${done}/${total})`;

        if (!state.activeId) return;

        let totalSec = total * 86400; 
        const firstTask = state.tasks[0].d[0];
        const startDate = getRealDate(state.tasks[0].m, firstTask.date);
        const elapsedSinceStart = Math.floor((Date.now() - startDate.getTime()) / 1000);
        let remainingGlobal = totalSec - elapsedSinceStart;
        updateCountdownUI(remainingGlobal < 0 ? 0 : remainingGlobal);

        const now = new Date();
        let gid = 1;
        state.tasks.forEach(month => {
            month.d.forEach(day => {
                const taskDate = getRealDate(month.m, day.date);
                const endOfDay = new Date(taskDate);
                endOfDay.setHours(23, 59, 59, 999);
                let diff = Math.floor((endOfDay.getTime() - now.getTime()) / 1000);
                if (diff < 0) diff = 0;
                if (diff > 86400) diff = 86400;
                updateRowTimerUI(gid++, diff);
            });
        });
    }

    function updateRowTimerUI(id, s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        const hEl = document.getElementById(`rt-h-${id}`);
        if (hEl) {
            hEl.innerText = h.toString().padStart(2, '0');
            document.getElementById(`rt-m-${id}`).innerText = m.toString().padStart(2, '0');
            document.getElementById(`rt-s-${id}`).innerText = sec.toString().padStart(2, '0');
        }
    }

    function updateCountdownUI(s) {
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        document.getElementById('d-val').innerText = d.toString().padStart(2, '0');
        document.getElementById('h-val').innerText = h.toString().padStart(2, '0');
        document.getElementById('m-val').innerText = m.toString().padStart(2, '0');
        document.getElementById('s-val').innerText = sec.toString().padStart(2, '0');
    }

    function handleTick(id, box) {
    if (state.done[id]) { box.checked = true; return; }
    
    if (!state.activeId) {
        box.checked = false;
        playSfx('alert');
        showModal("Not Started! ⚠️", "Start your session to mark tasks.", [
            { label: "Close", class: "btn-cancel", onClick: closeModal },
            { label: "Start Now", class: "btn-confirm", onClick: startTimer }
        ]); 
        return;
    }
    
    box.checked = false;

    // ১. টাস্কের ডেট এবং মাস বের করা
    let taskDateStr = "";
    let monthYearStr = "";
    state.tasks.forEach(month => {
        month.d.forEach(day => {
            if(day.id === id) {
                taskDateStr = day.date;
                monthYearStr = month.m;
            }
        });
    });

    const taskDate = getRealDate(monthYearStr, taskDateStr);
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ২. ডেট অনুযায়ী Dynamic Message সেট করা
    let message = "";
    if (taskDate.getTime() === today.getTime()) {
        message = `Did you complete all your tasks for today?`;
    } else if (taskDate < today) {
        message = `Did you complete these backlog tasks for "${taskDateStr}"?`;
    } else {
        message = `Ready to finish future tasks for "${taskDateStr}" in advance?`;
    }

    showModal("Mark as Completed? ✅", message, [
        { label: "Cancel", class: "btn-cancel", onClick: closeModal },
        { label: "Done!", class: "btn-confirm", onClick: () => confirmMark(id, box) }
    ]);
}

    function confirmMark(id, box) {
        state.done[id] = true; box.checked = true;
        const row = document.getElementById(`row-${id}`);
        row.classList.remove('missed'); row.classList.add('done');
        let currentDay;
        state.tasks.forEach(m => m.d.forEach(d => { if(d.id === id) currentDay = d; }));
        if (state.activeId === id) { state.activeId = findNext(); }
        const rect = box.getBoundingClientRect(); burstEffect(rect.left+10, rect.top+10);
        showToast(`${currentDay.date} tasks completed! 🎯`);
        playSfx('success'); 
        checkChapter(currentDay);
        save(); updateStats(); closeModal();
    }

    function checkChapter(day) {
        // এখানে t1, t2 এবং t3 তিনটিকেই ইনক্লুড করা হয়েছে
        const subjects = [day.t1, day.t2, day.t3];
        let itemsChecked = new Set(); 

        subjects.forEach(taskName => {
            // এখন এটি Ch- (Chapter), K- (Kobita), G- (Golpo) বা U- (Unit) সব চেক করবে
            if (taskName && (taskName.includes("Ch-") || taskName.includes("K-") || taskName.includes("G-") || taskName.includes("U-"))) {
                
                // Regex আপডেট করা হয়েছে যেন Ch, K, G বা U সবগুলোকে ধরতে পারে
                const match = taskName.match(/(.*?\b(Ch|K|G|U)-\d+)/);
                
                if (match) {
                    const baseItem = match[1].trim(); // যেমন: "Bng 1st K-02" বা "Phy 1st Ch-08"

                    if (itemsChecked.has(baseItem)) return;
                    itemsChecked.add(baseItem);

                    let allRowsOfItem = [];
                    
                    // পুরো প্ল্যানারের t1, t2, t3 সব কলামে এই চ্যাপ্টার/গল্পটি খুঁজবে
                    state.tasks.forEach(m => m.d.forEach(d => {
                        if ((d.t1 && d.t1.includes(baseItem)) || 
                            (d.t2 && d.t2.includes(baseItem)) || 
                            (d.t3 && d.t3.includes(baseItem))) {
                            allRowsOfItem.push(d.id);
                        }
                    }));

                    // যদি ওই আইটেমটি যেখানে যেখানে আছে সব জায়গাতেই 'Done' হয়ে থাকে
                    if (allRowsOfItem.length > 0 && allRowsOfItem.every(rid => state.done[rid])) {
                        showToast(`${baseItem} Fully Completed! 🏆`);
                        playSfx('completion');
                    }
                }
            }
        });
    }
    
    function isTodayTask(id) {
    let targetDay, targetMonth;

    state.tasks.forEach(m => {
        m.d.forEach(d => {
            if (d.id === id) {
                targetDay = d;
                targetMonth = m.m;
            }
        });
    });

    if (!targetDay) return false;

    const taskDate = getRealDate(targetMonth, targetDay.date);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return taskDate.getTime() === today.getTime();
}

    function checkMissedDays() {
        let missedCount = 0;
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        let globalId = 1;
        state.tasks.forEach(month => {
            month.d.forEach(day => {
                const taskDate = getRealDate(month.m, day.date);
                if (!state.done[globalId] && taskDate < now) missedCount++;
                globalId++;
            });
        });
        if (missedCount > 0) showToast(`You missed ${missedCount} days! 🔴`, true);
    }

    function startTimer() {
        if (state.activeId) return;
        const nextId = findNext();
        if (nextId) {
            state.activeId = nextId; state.startTime = Date.now();
            save(); updateButtonUI(true);
            
            const globalBox = document.getElementById('global-timer-box');
            globalBox.classList.remove('timer-locked');
            globalBox.classList.add('timer-running');
            
            document.querySelectorAll('.row-timer').forEach(el => el.classList.remove('timer-locked'));
            
            init(false);
            
            checkMissedDays();
            showToast("Session Started! 🚀"); 
            playSfx('success');
            closeModal();
        }
    }

    function findNext() {
        let gid = 1;
        for (const m of state.tasks) { for (const d of m.d) { if (!state.done[gid]) return gid; gid++; } }
        return null;
    }

    function updateButtonUI(running) {
        const btn = document.getElementById('start-btn');
        btn.innerText = running ? "● PROGRESS RUNNING" : "START STUDY SESSION";
        btn.className = running ? "start-btn btn-running" : "start-btn";
    }

    function showToast(msg, isRed = false) {
    const t = document.createElement('div'); t.className = isRed ? 'toast red' : 'toast'; t.innerText = msg;
    document.getElementById('toast-box').appendChild(t);
    // যাওয়ার সময় নিচে নেমে এবং ছোট হয়ে মিলিয়ে যাওয়ার স্মুথ ইফেক্ট
    setTimeout(() => { 
        t.style.opacity = '0'; 
        t.style.transform = 'translateY(20px) scale(0.9)'; 
        setTimeout(() => t.remove(), 400); 
    }, 4000);
}

function showModal(title, text, actions) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-text').innerText = text;
    const actionBox = document.getElementById('modal-actions'); actionBox.innerHTML = '';
    actions.forEach(btn => {
        const b = document.createElement('button'); b.className = `modal-btn ${btn.class}`;
        b.innerText = btn.label; b.onclick = btn.onClick; actionBox.appendChild(b);
    });
    // display: flex এর বদলে 'show' ক্লাস অ্যাড করা হলো
    document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() { 
    // display: none এর বদলে 'show' ক্লাস রিমুভ করা হলো
    document.getElementById('modal-overlay').classList.remove('show'); 
}

    function handleDragStart(e, id, field) { 
        if(state.done[id]) { e.preventDefault(); showToast("Completed tasks are locked! 🔒"); 
        playSfx('alert'); 
        return; } 
        draggedSource = { id, field };
    }

    function handleDrop(e, targetId, targetCell) {
        e.preventDefault();
        targetCell.classList.remove('drag-over');
        if (!draggedSource) return;
        
        const targetField = targetCell.getAttribute('data-field');
        
        if (draggedSource.id === targetId && draggedSource.field === targetField) {
            draggedSource = null;
            return; 
        }

        if (state.done[targetId]) { showToast("Cannot move tasks to a completed day! 🚫", true); 
        playSfx('alert'); 
        return; }
        
        let sDay, tDay;
        state.tasks.forEach(m => m.d.forEach(d => { 
            if (d.id === draggedSource.id) sDay = d; 
            if (d.id === targetId) tDay = d; 
        }));

        if (sDay && tDay) {
            // ডাটা সোয়াপ
            const temp = sDay[draggedSource.field];
            sDay[draggedSource.field] = tDay[targetField];
            tDay[targetField] = temp;

            // নতুন ডাটাগুলো লোকাল ভেরিয়েবলে সেভ করে রাখা হচ্ছে যেন null হয়ে না যায়
            const newSourceText = sDay[draggedSource.field];
            const newTargetText = tDay[targetField];

            // DOM আপডেট
            const sourceCell = document.querySelector(`td[data-id="${draggedSource.id}"][data-field="${draggedSource.field}"]`);
            
            if (sourceCell) {
                sourceCell.style.opacity = '0';
                targetCell.style.opacity = '0';

                // অ্যানিমেশন টাইমার
                setTimeout(() => {
                    sourceCell.innerHTML = newSourceText;
                    targetCell.innerHTML = newTargetText;
                    
                    sourceCell.style.opacity = '1';
                    targetCell.style.opacity = '1';
                }, 150); 
            }

            save(); 
            playSfx('click');
            showToast("Tasks Swapped! 🔄");
        }
        
        // সব কাজ শেষে draggedSource ক্লিয়ার করা হচ্ছে
        draggedSource = null;
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function burstEffect(x, y) {
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.setProperty('--x', (Math.random()*80 - 40) + 'px');
            p.style.setProperty('--y', (Math.random()*80 - 40) + 'px');
            document.body.appendChild(p); setTimeout(() => p.remove(), 600);
        }
    }

    init(true);
    // Service Worker Registration for Offline App
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered successfully.', reg))
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
    
    // স্ক্রল মোড হ্যান্ডেল করার ফাংশন
function toggleScroll() {
    const container = document.querySelector('.container');
    const btn = document.getElementById('scroll-btn');
    playSfx('click');
    const isScrollActive = container.classList.toggle('scroll-active');
    
    // বাটন টেক্সট এবং স্টাইল আপডেট
    if (isScrollActive) {
        btn.innerText = "🔒 DISABLE SCROLL";
        btn.classList.add('active');
    } else {
        btn.innerText = "🔓 ENABLE SCROLL";
        btn.classList.remove('active');
    }
    
    // লোকাল স্টোরেজে সেভ করে রাখা
    localStorage.setItem('hsc26_scroll_mode', isScrollActive);
}

// পেজ লোড হওয়ার সময় আগের সেটিংস চেক করা
window.addEventListener('DOMContentLoaded', () => {
    const savedScroll = localStorage.getItem('hsc26_scroll_mode') === 'true';
    if (savedScroll) {
        toggleScroll(); // যদি আগে এনাবল করা থাকে তবে তা অটোমেটিক চালু হবে
    }
});
</script>
